name: CI

on: [push, pull_request]

jobs:
  ci:
    runs-on: avrea-ubuntu-latest-1-vcpu
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua
        run: sudo apt-get update && sudo apt-get install -y lua5.4

      - uses: j178/prek-action@v2

      - name: Run tests
        run: make test

      - name: Build
        run: make build
