<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">kuvakirnu logo</title>
  <desc id="desc">Minimal logo combining a Finnish butter churn with stacked photo frames and the word kuvakirnu.</desc>
  <defs>
    <linearGradient id="photoGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d8efff"/>
      <stop offset="1" stop-color="#89bce4"/>
    </linearGradient>
    <style>
      .ink{fill:#06253b;stroke:#06253b;stroke-linejoin:round;stroke-linecap:round}
      .stroke{fill:none;stroke:#06253b;stroke-width:28;stroke-linejoin:round;stroke-linecap:round}
      .cut{fill:#fff}
      .word{font-family: Georgia, 'Times New Roman', serif;font-size:128px;font-weight:700;letter-spacing:.5px;fill:#06253b}
    </style>
  </defs>

  <rect width="1024" height="1024" fill="#fff"/>

  <!-- churn body -->
  <g transform="translate(0,-12)">
    <!-- handle / dasher -->
    <rect class="ink" x="488" y="170" width="48" height="206" rx="22"/>

    <!-- top ellipse and barrel -->
    <path class="ink" d="M350 340c0-52 324-52 324 0v316c0 52-324 52-324 0z"/>
    <ellipse class="cut" cx="512" cy="340" rx="136" ry="36"/>
    <path class="cut" d="M382 401h260v33H382zM382 637h260v33H382z"/>

    <!-- rear photo sheet -->
    <path d="M608 424l92 30 0 184-101 35z" fill="#dceeff" stroke="#06253b" stroke-width="28" stroke-linejoin="round"/>
    <path d="M628 462l44 14v124l-52 19z" fill="url(#photoGradient)" opacity=".9"/>

    <!-- main photo sheet -->
    <path d="M306 439l318-18 25 220-331 30z" fill="#fff" stroke="#06253b" stroke-width="28" stroke-linejoin="round"/>
    <path d="M350 470l241-13 16 145-252 22z" fill="url(#photoGradient)"/>

    <!-- landscape in photo -->
    <path d="M348 613l84-102 85 78 47-45 44 55 3 27z" fill="#06253b"/>
    <circle cx="560" cy="505" r="22" fill="#fff"/>
  </g>

  <!-- wordmark -->
  <text class="word" x="512" y="842" text-anchor="middle">kuvakirnu</text>
</svg>
